name: Build Talk Messenger APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.2"
          channel: stable
          cache: true

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SMSDEV_KEY=${{ secrets.SMSDEV_KEY }}
          AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        env:
          FLUTTER_BUILD_DISABLE_GRADLE_UPDATE: "true"
        run: |
          # Garante permissão de execução para o gradlew
          chmod +x android/gradlew
          # Limpa o projeto para evitar conflitos de cache
          ./android/gradlew clean -p android
          # Executa o build
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talk-messenger-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
